# Server
server.port=${PORT:8080}

# Database
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.datasource.url=${DB_URL:jdbc:h2:mem:bookstore}
spring.datasource.driver-class-name=${DB_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:crni99}
spring.datasource.password=${DB_PASSWORD:og}
spring.jpa.database-platform=${DB_PLATFORM:org.hibernate.dialect.H2Dialect}

spring.sql.init.platform=h2
spring.jpa.hibernate.ddl-auto=none

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.datasource.schema=classpath:db/schema.sql
spring.datasource.data=classpath:db/data.sql

# Connection pool properties
connection.pool.initialPoolSize=5
connection.pool.minPoolSize=5
connection.pool.maxPoolSize=20
connection.pool.maxIdleTime=3000

# Email
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS_ENABLE:true}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:yugesh@gmail.com}
spring.mail.password=${MAIL_PASSWORD:1234567890}

# Variables
shipping.costs=6.00